name: Capture Settrade Data

on:
  schedule:
    # เวลาทั้งหมดเป็น UTC (ประเทศไทยเร็วกว่า UTC 7 ชั่วโมง)
    - cron: '30 3 * * 1-5'   # 10:30 น. เวลาไทย (จันทร์-ศุกร์)
    - cron: '30 5 * * 1-5'   # 12:30 น. เวลาไทย
    - cron: '0 8 * * 1-5'    # 15:00 น. เวลาไทย
    - cron: '30 9 * * 1-5'   # 16:30 น. เวลาไทย
  workflow_dispatch: {}      # ปุ่มกดรันทดสอบเองได้ในแท็บ Actions

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Decode Google service-account credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > gcp-credentials.json

      - name: Run capture script
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-credentials.json
        run: python capture_settrade.py

      - name: Remove credentials file
        if: always()
        run: rm -f gcp-credentials.json
