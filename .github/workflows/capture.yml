name: Capture Settrade Data

on:
  schedule:
    # เวลาทั้งหมดเป็น UTC (ประเทศไทยเร็วกว่า UTC 7 ชั่วโมง)
    # ตั้งนาทีเยื้องจากเลขกลม (ไม่ใช่ :00/:30 ตรง ๆ) ตามคำแนะนำของ GitHub เอง
    # เพื่อลดโอกาสชนคิวกับ repo อื่นทั่วโลกที่มักตั้งเวลาเป็นเลขกลม ช่วยลด
    # ความล่าช้าของ schedule trigger ได้ (แต่ยังไม่การันตีว่าจะตรงเป๊ะ 100%
    # เพราะเป็นข้อจำกัดของ GitHub Actions free tier)
    - cron: '33 3 * * 1-5'   # ~10:33 น. เวลาไทย (จันทร์-ศุกร์)
    - cron: '33 5 * * 1-5'   # ~12:33 น. เวลาไทย
    - cron: '3 8 * * 1-5'    # ~15:03 น. เวลาไทย
    - cron: '33 9 * * 1-5'   # ~16:33 น. เวลาไทย
  workflow_dispatch: {}      # ปุ่มกดรันทดสอบเองได้ในแท็บ Actions

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Decode Google service-account credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > gcp-credentials.json

      - name: Run capture script
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-credentials.json
        run: python capture_settrade.py

      - name: Remove credentials file
        if: always()
        run: rm -f gcp-credentials.json
